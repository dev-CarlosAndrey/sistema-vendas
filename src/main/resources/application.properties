spring.application.name=vendas

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080

# ===================================================================
# H2 DATABASE CONFIGURATION
# ===================================================================
spring.datasource.url=jdbc:h2:mem:vendasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enables the visual H2 Console interface in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allows the console to be displayed inside frames (required by modern browsers)
spring.h2.console.settings.web-allow-others=false

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# Tells Hibernate to automatically drop and recreate tables on every startup (Perfect for tests)
spring.jpa.hibernate.ddl-auto=create-drop
# Specifies the H2 dialect for correct SQL generation
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Shows the SQL queries executed by Spring Data in the console terminal
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ===================================================================
# Customizes the path to access the Swagger UI HTML documentation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs